    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*HSC_TEMP.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "hsc_temp_celsius"
        type: gauge
        unit: celsius
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  - name: hsc_voltage
    description: Hot swap controller voltage readings
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*HSC_VOLTAGE.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "hsc_voltage_volts"
        type: gauge
        unit: volts
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  # ========================================================================
  # IBC (INTERMEDIATE BUS CONVERTER) TEMPERATURE
  # ========================================================================

  - name: ibc_temperature
    description: IBC temperature readings (non-VR)
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*IBC.*TEMP.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "ibc_temp_celsius"
        type: gauge
        unit: celsius
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  # ========================================================================
  # BOARD-LEVEL TEMPERATURE METRICS
  # ========================================================================

  - name: board_temperature
    description: Board-level temperature sensors (UBB, FPGA)
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*(UBB_TEMP|FPGA_TEMP).*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "board_temp_celsius"
        type: gauge
        unit: celsius
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  # ========================================================================
  # GPU AGGREGATE & BOARD POWER METRICS
  # ========================================================================

  - name: gpu_total_power
    description: Total GPU power consumption (aggregate across all GPUs)
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*GPU_TOTAL_POWER.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "gpu_total_power_watts"
        type: gauge
        unit: watts
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  - name: gpu_warmest_temperature
    description: GPU warmest temperature readings (aggregate hottest sensor)
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*GPU_WARMEST.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "gpu_warmest_temp_celsius"
        type: gauge
        unit: celsius
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  - name: board_power
    description: UBB board-level power consumption
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ "(?i).*UBB_POWER.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "board_power_watts"
        type: gauge
        unit: watts
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

  # ========================================================================
  # GPU UTILIZATION METRICS
  # ========================================================================

  - name: gpu_bandwidth_utilization
    description: GPU memory bandwidth utilization percentage
    path_pattern: '$.MetricValues[?(@.MetricProperty =~ ".*BandwidthPercent.*")]'
    fields:
      - json_key: "MetricValue"
        metric_name: "gpu_bandwidth_percent"
        type: gauge
        unit: percent
    tags_from:
      - json_key: "MetricProperty"
        tag_name: "sensor_path"

# ========================================================================
# AUTO-DISCOVERY CONFIGURATION
# ========================================================================

auto_discovery:
  enabled: true

  # Include fields matching these patterns (glob-style)
  include_patterns:
    - "*Temp*"
    - "*Temperature*"
    - "*TEMP*"
    - "*Watts*"
    - "*Power*"
    - "*POWER*"
    - "*Percent*"
    - "*Util*"
    - "*Bytes*"
    - "*MHz*"
    - "*Clock*"
    - "*Count*"
    - "*Rate*"
    - "*Speed*"
    - "*Voltage*"
    - "*VOLTAGE*"
    - "*Current*"
    - "*CURRENT*"
    - "*Status*"
    - "*STATUS*"
    - "*Health*"
    - "*HEALTH*"
    - "*Reading"
    - "*Value"

  # Exclude fields matching these patterns
  exclude_patterns:
    - "*Timestamp*"
    - "*timestamp*"
    - "*Version*"
    - "*Serial*"
    - "*UUID*"
    - "*Name*"
    - "*ID*"
    - "*Description*"
    - "*@odata*"
    - "*MetricId"
    - "*MetricProperty"

  # Default metric type for auto-discovered metrics
  default_type: gauge

  # Maximum recursion depth for JSON traversal
  max_depth: 50
