name: Feature request
description: Suggest an enhancement or new capability for GYANAM
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please search existing issues
        first to see if it has already been proposed.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve? Who needs it and why?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the capability or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Fleet size, GPU model, deployment details, or anything else relevant.
    validations:
      required: false
