name: Bug report
description: Report a problem with GYANAM
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Do not report security vulnerabilities here** — follow
        [SECURITY.md](https://github.com/amd/Gyanam-GPU-Observability-Assistant/blob/main/SECURITY.md)
        instead. Please also search existing issues before opening a new one.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Configure target with ...
        2. Run ./gyanam.sh ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
      description: What you expected to happen, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Deployment details.
      value: |
        - GYANAM version / commit (`git rev-parse --short HEAD`):
        - OS / version:
        - Docker version:
        - Fleet size (approx. GPUs):
        - Transport (Redfish / SSH-proxy / SSE):
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        Output from `./gyanam.sh logs <service>` or error messages.
        Redact credentials, tokens, and BMC hostnames.
      render: shell
    validations:
      required: false
